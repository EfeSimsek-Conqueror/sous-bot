<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1280" width="1024" height="1280">
  <title>Sousbot Brand Preview</title>
  <defs>
    <style>
      .label { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 14px; fill: #333; }
      .sublabel { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 12px; fill: #666; }
    </style>
    <g id="pot-glyph">
      <path d="M40 8c-5 6 5 11 0 18" fill="none" stroke="currentColor" stroke-width="6" stroke-linecap="round"/>
      <path d="M60 8c-5 6 5 11 0 18" fill="none" stroke="currentColor" stroke-width="6" stroke-linecap="round"/>
      <rect x="20" y="33" width="60" height="7" rx="3.5" fill="currentColor"/>
      <path d="M26 46h48v20a14 14 0 0 1-14 14H40a14 14 0 0 1-14-14z" fill="currentColor"/>
      <rect x="14" y="50" width="7" height="12" rx="3.5" fill="currentColor"/>
      <rect x="79" y="50" width="7" height="12" rx="3.5" fill="currentColor"/>
    </g>
    <linearGradient id="iconGrad" x1="0" y1="0" x2="100" y2="100" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#D68D50"/>
      <stop offset="1" stop-color="#945623"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="1024" height="1280" fill="#F4EBE3"/>

  <!-- Title -->
  <text x="20" y="40" font-family="system-ui" font-size="28" font-weight="bold" fill="#333">Sousbot Brand Assets</text>
  <text x="20" y="65" font-family="system-ui" font-size="14" fill="#666">Steaming pot glyph identity system</text>

  <!-- Section 1: App Icon at Different Sizes -->
  <text x="20" y="120" class="label" font-weight="bold">App Icon at Various Sizes</text>

  <!-- 512px -->
  <g transform="translate(40,140)">
    <rect x="0" y="0" width="256" height="256" rx="57.6" fill="url(#iconGrad)"/>
    <ellipse cx="128" cy="76.8" rx="107.5" ry="56.4" fill="#FFFFFF" opacity="0.16"/>
    <g transform="translate(48.6,48.6) scale(1.588)">
      <use href="#pot-glyph" style="color:#FFFFFF"/>
    </g>
    <text x="128" y="310" class="sublabel" text-anchor="middle">512px</text>
  </g>

  <!-- 96px -->
  <g transform="translate(330,170)">
    <rect x="0" y="0" width="96" height="96" rx="21.6" fill="url(#iconGrad)"/>
    <ellipse cx="48" cy="28.8" rx="40.3" ry="21.2" fill="#FFFFFF" opacity="0.16"/>
    <g transform="translate(18.24,18.24) scale(0.596)">
      <use href="#pot-glyph" style="color:#FFFFFF"/>
    </g>
    <text x="48" y="130" class="sublabel" text-anchor="middle">96px</text>
  </g>

  <!-- 48px -->
  <g transform="translate(470,190)">
    <rect x="0" y="0" width="48" height="48" rx="10.8" fill="url(#iconGrad)"/>
    <ellipse cx="24" cy="14.4" rx="20.2" ry="10.6" fill="#FFFFFF" opacity="0.16"/>
    <g transform="translate(9.12,9.12) scale(0.298)">
      <use href="#pot-glyph" style="color:#FFFFFF"/>
    </g>
    <text x="24" y="85" class="sublabel" text-anchor="middle">48px</text>
  </g>

  <!-- 16px (actual size for legibility check) -->
  <g transform="translate(560,210)">
    <rect x="0" y="0" width="16" height="16" rx="3.6" fill="url(#iconGrad)"/>
    <g transform="translate(3.04,3.04) scale(0.0993)">
      <use href="#pot-glyph" style="color:#FFFFFF"/>
    </g>
    <text x="8" y="65" class="sublabel" text-anchor="middle">16px favicon</text>
  </g>

  <!-- Section 2: Standalone Glyph -->
  <text x="20" y="420" class="label" font-weight="bold">Standalone Glyph</text>
  <g transform="translate(40,440)">
    <g transform="scale(3)">
      <use href="#pot-glyph" style="color:#D68D50"/>
    </g>
    <text x="150" y="180" class="sublabel">Accent colour</text>
  </g>

  <!-- Section 3: Theme Tiles -->
  <text x="20" y="680" class="label" font-weight="bold">Theme Tiles</text>

  <!-- On Dark -->
  <g transform="translate(40,700)">
    <rect x="0" y="0" width="180" height="180" rx="40" fill="#2B2018"/>
    <g transform="translate(54,54) scale(1.8)">
      <use href="#pot-glyph" style="color:#FFFFFF"/>
    </g>
    <text x="90" y="220" class="sublabel" text-anchor="middle">On dark</text>
  </g>

  <!-- On Light -->
  <g transform="translate(270,700)">
    <rect x="0" y="0" width="180" height="180" rx="40" fill="#FFFFFF" stroke="#E3D9CF" stroke-width="2"/>
    <g transform="translate(54,54) scale(1.8)">
      <use href="#pot-glyph" style="color:#D68D50"/>
    </g>
    <text x="90" y="220" class="sublabel" text-anchor="middle">On light</text>
  </g>

  <!-- Section 4: Lockups -->
  <text x="20" y="1000" class="label" font-weight="bold">Logo Lockups</text>

  <!-- Light lockup -->
  <g transform="translate(40,1020)">
    <g transform="scale(2.5) translate(0,0)">
      <defs>
        <g id="pot-glyph-lockup">
          <path d="M40 8c-5 6 5 11 0 18" fill="none" stroke="currentColor" stroke-width="6" stroke-linecap="round"/>
          <path d="M60 8c-5 6 5 11 0 18" fill="none" stroke="currentColor" stroke-width="6" stroke-linecap="round"/>
          <rect x="20" y="33" width="60" height="7" rx="3.5" fill="currentColor"/>
          <path d="M26 46h48v20a14 14 0 0 1-14 14H40a14 14 0 0 1-14-14z" fill="currentColor"/>
          <rect x="14" y="50" width="7" height="12" rx="3.5" fill="currentColor"/>
          <rect x="79" y="50" width="7" height="12" rx="3.5" fill="currentColor"/>
        </g>
      </defs>
      <use href="#pot-glyph-lockup" style="color:#D68D50"/>
      <text x="80" y="55" font-family="system-ui" font-size="32" font-weight="600" fill="#72431B">Sousbot</text>
    </g>
    <text x="0" y="150" class="sublabel">Light background</text>
  </g>

  <!-- Dark lockup -->
  <g transform="translate(40,1150)">
    <rect x="0" y="0" width="500" height="80" rx="8" fill="#2B2018"/>
    <g transform="scale(2.5) translate(16,8)">
      <use href="#pot-glyph-lockup" style="color:#D68D50"/>
      <text x="80" y="55" font-family="system-ui" font-size="32" font-weight="600" fill="#FFFFFF">Sousbot</text>
    </g>
    <text x="0" y="110" class="sublabel">Dark background</text>
  </g>
</svg>
